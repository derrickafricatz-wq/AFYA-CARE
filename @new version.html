<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Education</title>

<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

<style>

html,body{
  margin:0; padding:0; height:100%; width:100%;
  background:black; color:white;
  font-family:Arial, Helvetica, sans-serif;
  overflow:hidden;
}

/* VIDEO */
#brandVideo{
  position:fixed; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  z-index:0;
}

/* ===== ADDED FROM SCRIPT 2 ===== */

/* LOGO TICKER */
#logoTicker{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:300px;
  overflow:hidden;
  z-index:10;
  pointer-events:none;
}
#logoTickerInner{
  display:flex;
  white-space:nowrap;
  animation:scrollLogo 25s linear infinite;
}
#logoTickerInner img{
  height:290px;
  margin-right:120px;
  opacity:0.9;
}
@keyframes scrollLogo{
  0%{transform:translateX(100%);}
  100%{transform:translateX(-100%);}
}

/* CLOCK */
#clockBox{
  position:fixed;
  top:10px;
  left:20px;
  font-size:32px;
  background:rgba(0,0,0,0.6);
  padding:10px 18px;
  border-radius:10px;
  z-index:10;
}

/* WEATHER */
#weatherBox{
  position:fixed;
  top:10px;
  right:20px;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:18px;
  z-index:10;
  line-height:1.5;
}

/* ADS */
#adImage{
  position:fixed;
  top:0;
  right:-100%;
  width:50%;
  height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:6;
  transition:right .6s ease;
}
#adImage img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SCROLL */
#scrollBanner{
  position:fixed;
  bottom:0;
  width:100%;
  background:black;
  z-index:10;
  padding:8px 0;
}
#scrollText{
  white-space:nowrap;
  animation:scroll 30s linear infinite;
  font-size:30px;
}
.dekaStyle{
  font-family:'Russo One', sans-serif;
  color:#00ffff;
  font-size:38px;
}
@keyframes scroll{
  from{transform:translateX(100%);}
  to{transform:translateX(-100%);}
}

/* ===== ORIGINAL SCRIPT 1 CONTINUES ===== */

#lessonLabel{
  position:fixed;
  top:70px;
  left:20px;
  background:rgba(0,0,0,0.6);
  padding:10px 16px;
  border-radius:14px;
  font-size:16px;
  color:#00ffff;
  z-index:5;
}

#toggleBtn{
  position:fixed;
  bottom:62px;
  right:20px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:linear-gradient(145deg,#00ffff,#00baba);
  box-shadow:0 0 18px rgba(0,255,255,0.6);
  color:black;
  font-size:25px;
  font-weight:bold;
  border:none;
  z-index:6;
  cursor:pointer;
}

#controls{
  position:fixed;
  bottom:90px;
  right:20px;
  width:220px;
  background:rgba(0,0,0,0.78);
  backdrop-filter:blur(10px);
  border:1px solid rgba(0,255,255,0.4);
  box-shadow:0 0 25px rgba(0,255,255,0.25);
  border-radius:22px;
  z-index:5;
  opacity:0;
  pointer-events:none;
  transition:opacity .35s ease;
}
#controls.show{opacity:1; pointer-events:auto;}

#brandHeader{
  text-align:center;
  padding:12px 10px 8px;
  font-size:12px;
  letter-spacing:1px;
  color:#00ffff;
}

#controlGrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:14px;
}

.ctrl-btn{
  width:48px;
  height:48px;
  border-radius:50%;
  border:none;
  background:linear-gradient(145deg,#00ffff,#00baba);
  box-shadow:0 0 12px rgba(0,255,255,0.6);
  color:black;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
}

</style>
</head>

<body>

<video id="brandVideo" autoplay muted playsinline></video>

<!-- LOGO -->
<div id="logoTicker">
  <div id="logoTickerInner">
    <img src="https://i.imgur.com/KZlMkqV.png">
    <img src="https://i.imgur.com/KZlMkqV.png">
  </div>
</div>

<!-- CLOCK & WEATHER -->
<div id="clockBox"></div>
<div id="weatherBox">Loading Weather...</div>

<div id="lessonLabel">ALL HEALTH LESSONS. By Deka</div>

<!-- ADS -->
<div id="adImage">
  <img id="adImg">
</div>

<!-- SCROLL -->
<div id="scrollBanner">
  <div id="scrollText">
    <span class="dekaStyle">SHIRIKA LA AFYA DUNIANI</span> • Linda Afya Yako Leo •
  </div>
</div>

<button id="toggleBtn">≡</button>

<div id="controls">
  <div id="brandHeader">Developed By Deka</div>
  <div id="controlGrid">
    <button class="ctrl-btn" id="prev">⏮</button>
    <button class="ctrl-btn" id="rew">⏪</button>
    <button class="ctrl-btn" id="next">⏭</button>
    <button class="ctrl-btn" id="playPause">⏯</button>
    <button class="ctrl-btn" id="ff">⏩</button>
  </div>
</div>

<script>
const video = document.getElementById("brandVideo");

/* ===== ADDED FEATURES ===== */

/* CLOCK */
setInterval(()=>{
  clockBox.innerText=new Date().toLocaleTimeString();
},1000);

/* WEATHER */
const cities=["Dar es Salaam","Dodoma","Arusha","Mwanza"];
async function loadWeather(){
let html="<b>Weather TZ</b><br>";
for(const city of cities){
try{
let geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}`);
let g=await geo.json();
if(!g.results){html+=city+": --<br>";continue;}
let {latitude,longitude}=g.results[0];
let w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
let d=await w.json();
html+=city+": "+Math.round(d.current_weather.temperature)+"°C<br>";
}catch{
html+=city+": --<br>";
}}
weatherBox.innerHTML=html;
}
loadWeather();
setInterval(loadWeather,600000);

/* ADS */
const adImages=[
"ads/ad1.jpg",
"ads/ad2.png",
"https://i.imgur.com/ZL4l5Gj.jpeg",
"https://i.imgur.com/KZlMkqV.png"
];
let adIndex=0;
function showAd(){
adImg.src=adImages[adIndex];
adIndex=(adIndex+1)%adImages.length;
adImage.style.right="0";
setTimeout(()=>adImage.style.right="-100%",10000);
}
setInterval(showAd,30000);

/* ===== ORIGINAL VIDEO SYSTEM ===== */

let lessons = {
  1: ["https://i.imgur.com/YOYyJ49.mp4", "shortheart.mp4"],
  2: ["shortheart.mp4"],
  3: ["htt.mp4"],
  4: ["https://i.imgur.com/nXmK9G4.mp4"]
};

let playlist = [].concat(...Object.values(lessons));
let index = 0;
let soundUnlocked = false;

function playVideo(i){
  if(i >= playlist.length) i = 0;
  if(i < 0) i = playlist.length-1;
  index = i;
  video.src = playlist[index];
  video.play().catch(()=>{});
}

playVideo(0);
video.addEventListener("ended", () => playVideo(index + 1));

function unlockSound(){
  if(soundUnlocked) return;
  soundUnlocked = true;
  video.muted = false;
  document.removeEventListener("click", unlockSound);
  document.removeEventListener("touchstart", unlockSound);
}
document.addEventListener("click", unlockSound);
document.addEventListener("touchstart", unlockSound);

/* CONTROLS */
toggleBtn.onclick=()=>controls.classList.toggle("show");
prev.onclick = () => playVideo(index - 1);
next.onclick = () => playVideo(index + 1);
rew.onclick  = () => video.currentTime -= 10;
ff.onclick   = () => video.currentTime += 10;
playPause.onclick = () => video.paused ? video.play() : video.pause();

/* LESSON KEYS */
document.addEventListener("keydown", (e) => {
  if(lessons[e.key]){
    playlist = lessons[e.key];
    index = 0;
    playVideo(0);
  }
});
</script>

</body>
</html>
